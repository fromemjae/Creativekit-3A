<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - CreativeKit3A</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: var(--white-off);">

  <header style="padding: 20px; text-align: center; background: var(--black);">
    <a href="index.html" style="display: inline-flex; align-items: center; gap: 10px; text-decoration: none;">
      <span style="color: var(--white); font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1.4rem;">CreativeKit3A</span>
    </a>
  </header>

  <main class="auth-page-wrapper">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your account</p>
      
      <div class="lm-msg lm-msg--error" id="lm-login-error" hidden></div>

      <form class="auth-form" onsubmit="handleSignIn(event)">
        
        <div class="lm-field">
          <label for="login-email"><i class="fas fa-envelope"></i> Email Address</label>
          <div class="auth-input-wrap">
            <input type="email" id="login-email" placeholder="Enter your email" required>
          </div>
        </div>

        <div class="lm-field">
          <label for="login-password"><i class="fas fa-lock"></i> Password</label>
          <div class="auth-input-wrap">
            <input type="password" id="login-password" placeholder="Enter your password" required>
          </div>
        </div>

        <button type="submit" class="auth-submit-btn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
        
      </form>

      <p class="auth-switch-text">
        Don't have an account? <a href="register.html">Register here</a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="main.js"></script>
</body>
</html>
