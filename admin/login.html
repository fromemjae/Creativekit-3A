<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Sign In | CreativeKit3A</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="admin.css?v=">
</head>
<body>

  <div class="login-container">
    <div class="login-logo">
      <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
      <h1>CreativeKit3A</h1>
    </div>

    <h2>Sign in to continue</h2>

    
    <div class="alert-danger"><i class="fas fa-exclamation-circle"></i> </div>
    

    <form method="POST" action="login.php">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" name="email" value="" placeholder="admin@example.com" required autofocus>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn-login">Secure Login</button>
    </form>
  </div>

</body>
</html>
