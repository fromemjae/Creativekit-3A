<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - CreativeKit3A</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: var(--white-off);">

  <header style="padding: 20px; text-align: center; background: var(--black);">
    <a href="index.html" style="display: inline-flex; align-items: center; gap: 10px; text-decoration: none;">
      <span style="color: var(--white); font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1.4rem;">CreativeKit3A</span>
    </a>
  </header>

  <main class="auth-page-wrapper">
    <div class="auth-card">
      <h2>Create an Account</h2>
      <p class="auth-subtitle">Join us to manage your corporate giveaways</p>
      
      <div class="lm-msg lm-msg--error" id="lm-reg-error" hidden></div>
      <div class="lm-msg lm-msg--success" id="lm-reg-success" hidden></div>

      <form class="auth-form" onsubmit="handleRegister(event)">

        <div class="lm-field">
          <label for="reg-firstname"><i class="fas fa-user"></i> First Name</label>
          <div class="auth-input-wrap">
            <input type="text" id="reg-firstname" placeholder="Enter your first name" required>
          </div>
        </div>

        <div class="lm-field">
          <label for="reg-lastname"><i class="fas fa-user"></i> Last Name</label>
          <div class="auth-input-wrap">
            <input type="text" id="reg-lastname" placeholder="Enter your last name" required>
          </div>
        </div>
        
        <div class="lm-field">
          <label for="reg-email"><i class="fas fa-envelope"></i> Email Address</label>
          <div class="auth-input-wrap">
            <input type="email" id="reg-email" placeholder="example@company.com" required>
          </div>
        </div>

        <div class="lm-field">
          <label for="reg-password"><i class="fas fa-lock"></i> Password</label>
          <div class="auth-input-wrap">
            <input type="password" id="reg-password" placeholder="Create a strong password" required>
          </div>
        </div>

        <div class="lm-field">
          <label for="lm-reg-confirm"><i class="fas fa-shield-alt"></i> Confirm Password</label>
          <div class="auth-input-wrap">
            <input type="password" id="lm-reg-confirm" placeholder="Repeat password" required>
          </div>
        </div>

        <div style="margin-bottom: 20px; font-size: 0.85rem; color: var(--grey-dark);">
          <label><input type="checkbox" id="lm-reg-terms" required> I agree to the Terms & Conditions</label>
        </div>

        <button type="submit" class="auth-submit-btn">
          <i class="fas fa-user-plus"></i> Register Account
        </button>
        
      </form>

      <p class="auth-switch-text">
        Already have an account? <a href="login.html">Sign In here</a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="main.js"></script>
  <script src="auth.js"></script>
</body>
</html>
